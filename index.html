<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Social</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
overflow:hidden;
background:#050510;
}

/* animated background */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:linear-gradient(
120deg,
#0f172a,
#1e293b,
#1f2a44,
#0a0f25
);

background-size:400% 400%;
animation:bgmove 20s infinite alternate;
z-index:-2;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* particles */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* container */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;

background:rgba(20,25,45,0.6);
padding:60px;
border-radius:30px;

backdrop-filter:blur(15px);

box-shadow:0 20px 80px rgba(0,0,0,0.7);
width:340px;
max-width:90%;
}

/* title */

h1{
font-size:38px;
margin-bottom:10px;
letter-spacing:2px;
}

/* text */

p{
color:#cbd5ff;
margin-bottom:30px;
}

/* buttons */

.button{

display:block;
width:100%;
margin:20px 0;
padding:18px;

border:none;
border-radius:50px;

font-size:18px;
cursor:pointer;

color:white;

background:linear-gradient(145deg,#334155,#1e293b);

box-shadow:
0 12px 25px rgba(0,0,0,0.6),
inset 0 1px 2px rgba(255,255,255,0.15);

transition:all .25s;
}

.button:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:
0 18px 40px rgba(0,0,0,0.8),
0 0 15px rgba(120,150,255,0.4);
}

.button:active{
transform:translateY(4px);
box-shadow:inset 0 6px 15px rgba(0,0,0,0.8);
}

.desc{
font-size:14px;
color:#aab4ff;
margin-top:-10px;
}

/* 📱 mobile optimization */

@media (max-width:600px){

.container{
padding:40px 25px;
}

h1{
font-size:28px;
}

p{
font-size:15px;
}

.button{
font-size:16px;
padding:16px;
}

.desc{
font-size:13px;
}

}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<h1>Welcome</h1>
<p>Connect with my social network</p>

<button class="button" onclick="openChannel()">Channel</button>
<div class="desc">This button leads to my Telegram channel</div>

<button class="button" onclick="openPrivate()">Private Message</button>
<div class="desc">This button is for sending anonymous messages</div>

<button class="button" onclick="openProfile()">My Social</button>
<div class="desc">This button leads to my main social page</div>

</div>

<script>

function openChannel(){
window.location.href="https://cilxme.t.me";
}

function openPrivate(){
window.location.href="https://anondevbot.t.me";
}

function openProfile(){
window.location.href="https://t.me";
}

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

let particles=[]

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5)*0.5,
dy:(Math.random()-0.5)*0.5
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="rgba(150,170,255,0.7)"

particles.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fill()

p.x+=p.dx
p.y+=p.dy

if(p.x<0||p.x>canvas.width) p.dx*=-1
if(p.y<0||p.y>canvas.height) p.dy*=-1
})

requestAnimationFrame(draw)
}

draw()

</script>

</body>
</html>
